<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Background -->
  <rect width="180" height="180" fill="#050816" rx="40"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#53d6ae;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#53d6ae;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd3a5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Globe/Atlas Symbol -->
  <g transform="translate(90, 90)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#iconGradient)" stroke-width="3"/>
    
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
    
    <!-- Grid lines for globe effect -->
    <line x1="-40" y1="0" x2="40" y2="0" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Curved lines -->
    <path d="M -28,-28 Q 0,-40 28,-28" fill="none" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.6"/>
    <path d="M -28,28 Q 0,40 28,28" fill="none" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Center point -->
    <circle cx="0" cy="0" r="4" fill="url(#iconGradient)"/>
  </g>
</svg>